<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title injected by vite-plugin-html, переопределяется Helmet -->
    <title><%- title %></title>
    
    <!-- Статические метатеги, которые не зависят от языка -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="NEXACORE" />
    
    <!-- Open Graph статические ссылки (остальное динамически) -->
    <meta property="og:image" content="https://nexacore-site.vercel.app/og-image.jpg" />
    <meta property="og:site_name" content="NEXACORE" />
    
    <!-- Twitter Card статические -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nexacore-site.vercel.app/og-image.jpg" />
    
    <!-- Hreflang на все языки (статически, чтобы поисковики видели) -->
    <link rel="alternate" hreflang="ru" href="https://nexacore-site.vercel.app/?lang=ru" />
    <link rel="alternate" hreflang="uz" href="https://nexacore-site.vercel.app/?lang=uz" />
    <link rel="alternate" hreflang="kk" href="https://nexacore-site.vercel.app/?lang=kk" />
    <link rel="alternate" hreflang="be" href="https://nexacore-site.vercel.app/?lang=be" />
    <link rel="alternate" hreflang="en" href="https://nexacore-site.vercel.app/?lang=en" />
    <link rel="alternate" hreflang="x-default" href="https://nexacore-site.vercel.app/" />
    
    <!-- Канонический URL (динамически переопределится в Helmet) -->
    <link rel="canonical" href="https://nexacore-site.vercel.app/" />
    
    <!-- JSON-LD Structured Data (Organization & WebSite) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NEXACORE",
      "url": "https://nexacore-site.vercel.app",
      "logo": "https://nexacore-site.vercel.app/favicon.svg",
      "description": "Инжиниринг полного цикла: высоконагруженные системы, ИИ-интеграция, промышленный бэкенд.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Ташкент",
        "addressCountry": "UZ"
      },
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "precisionworks2022@gmail.com",
          "telephone": "+998931974100",
          "contactType": "sales"
        }
      ],
      "sameAs": [
        "https://t.me/Anton_199X",
        "https://www.linkedin.com/in/anton-vylderov-nexacoreai-medtech/"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NEXACORE",
      "url": "https://nexacore-site.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://nexacore-site.vercel.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
